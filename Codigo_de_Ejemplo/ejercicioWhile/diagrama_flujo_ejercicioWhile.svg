<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333" />
    </marker>
    <style>
      .terminator { fill:#d1e7dd; stroke:#0f5132; stroke-width:2 }
      .process { fill:#f8f9fa; stroke:#0d6efd; stroke-width:2 }
      .io { fill:#fff3cd; stroke:#856404; stroke-width:2 }
      .decision { fill:#f8d7da; stroke:#842029; stroke-width:2 }
      .text { font-family: Arial, Helvetica, sans-serif; font-size:14px; fill:#000 }
      .title { font-weight:700; font-size:16px }
    </style>
  </defs>

  <!-- Título -->
  <text x="450" y="30" text-anchor="middle" class="text title">Diagrama de flujo - ejercicioWhile.java</text>

  <!-- Start -->
  <ellipse class="terminator" cx="450" cy="80" rx="120" ry="28" />
  <text x="450" y="86" text-anchor="middle" class="text">Start</text>

  <!-- Input: Ingrese un numero -->
  <polygon class="io" points="240,150 660,150 600,200 300,200" />
  <text x="450" y="178" text-anchor="middle" class="text">Mostrar: "Ingrese un numero"</text>
  <line x1="450" y1="200" x2="450" y2="230" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Input: Leer numero -->
  <rect class="process" x="220" y="230" width="460" height="48" rx="6" />
  <text x="450" y="260" text-anchor="middle" class="text">Leer entrada -> int numero = nextInt()</text>
  <line x1="450" y1="278" x2="450" y2="330" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Process: calcular digitos -->
  <rect class="process" x="220" y="330" width="460" height="48" rx="6" />
  <text x="450" y="360" text-anchor="middle" class="text">numeroDigitos = String.valueOf(numero).length()</text>
  <line x1="450" y1="378" x2="450" y2="430" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Output: imprimir digitos -->
  <polygon class="io" points="240,430 660,430 600,480 300,480" />
  <text x="450" y="458" text-anchor="middle" class="text">Imprimir: "El numero tiene X digitos"</text>
  <line x1="450" y1="480" x2="450" y2="540" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Process: entrar al ciclo while(true) -->
  <rect class="process" x="220" y="540" width="460" height="48" rx="6" />
  <text x="450" y="570" text-anchor="middle" class="text">while (true) - iniciar bucle</text>
  <line x1="450" y1="588" x2="450" y2="640" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

  <!-- IO: preguntar si desea ingresar mas datos -->
  <polygon class="io" points="240,640 660,640 600,700 300,700" />
  <text x="450" y="675" text-anchor="middle" class="text">Mostrar: "Desea Ingresar mas datos el programa? (s/n)"</text>
  <line x1="450" y1="700" x2="450" y2="760" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Input: leer respuesta -->
  <rect class="process" x="220" y="760" width="460" height="46" rx="6" />
  <text x="450" y="790" text-anchor="middle" class="text">respuesta = leerDatoConsola.next()</text>
  <line x1="450" y1="806" x2="450" y2="860" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Decision: respuesta == 'n' ? -->
  <polygon class="decision" points="450,880 540,960 450,1040 360,960" />
  <text x="450" y="960" text-anchor="middle" class="text">¿respuesta == 'n' ?</text>

  <!-- Yes (n) branch -->
  <line x1="540" y1="960" x2="640" y2="960" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <rect class="process" x="640" y="920" width="180" height="48" rx="6" />
  <text x="730" y="950" text-anchor="middle" class="text">Imprimir: "Programa finalizado"</text>
  <line x1="730" y1="968" x2="730" y2="1020" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <ellipse class="terminator" cx="730" cy="1050" rx="80" ry="26" />
  <text x="730" y="1056" text-anchor="middle" class="text">End</text>

  <!-- No branch: respuesta != 'n' -->
  <line x1="360" y1="960" x2="260" y2="960" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <text x="280" y="940" class="text">no</text>

  <!-- Decision 2: respuesta == 's' ? (left branch) -->
  <polygon class="decision" points="180,880 270,960 180,1040 90,960" />
  <text x="180" y="960" text-anchor="middle" class="text">¿respuesta == 's' ?</text>

  <!-- If yes (s): pedir numero, leer, calcular, imprimir, volver al inicio del bucle -->
  <line x1="270" y1="960" x2="270" y2="860" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <rect class="process" x="70" y="760" width="220" height="46" rx="6" />
  <text x="180" y="790" text-anchor="middle" class="text">Imprimir: "Ingrese un numero"</text>
  <line x1="180" y1="806" x2="180" y2="860" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <rect class="process" x="70" y="860" width="220" height="46" rx="6" />
  <text x="180" y="890" text-anchor="middle" class="text">numero = nextInt()</text>
  <line x1="180" y1="906" x2="180" y2="960" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <rect class="process" x="70" y="960" width="220" height="46" rx="6" />
  <text x="180" y="990" text-anchor="middle" class="text">numeroDigitos = String.valueOf(numero).length()</text>
  <line x1="180" y1="1006" x2="180" y2="1046" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />
  <polygon class="io" points="70,1046 290,1046 250,1088 110,1088" />
  <text x="180" y="1070" text-anchor="middle" class="text">Imprimir: "El numero tiene X digitos"</text>
  <!-- Flecha de retorno al prompt del bucle -->
  <line x1="180" y1="1090" x2="450" y2="720" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Else branch: respuesta no valida -> imprimir mensaje y volver al inicio del bucle -->
  <rect class="process" x="300" y="1060" width="320" height="48" rx="6" />
  <text x="460" y="1090" text-anchor="middle" class="text">Imprimir: "Respuesta no valida, por favor ingrese 's' o 'n'"</text>
  <line x1="460" y1="1110" x2="450" y2="720" stroke="#333" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Nota: la flecha de retorno conecta al prompt de pregunta dentro del bucle -->

</svg>
